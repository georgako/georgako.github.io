  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --accent: #3a6b8a;
      --accent2: #7aab72;
      --text: #1e1e1e;
      --muted: #8a8480;
      --border: rgba(58,107,138,0.22);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.16;
      pointer-events: none;
      z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -120px; left: -100px; animation-delay: -9s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 1.2rem;
    }

    .rule {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    }

    /* Photo */
    .photo-ring {
      position: relative;
      width: 120px;
      height: 120px;
      animation: fadeUp 0.9s ease both;
      flex-shrink: 0;
    }

    .photo-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: spin 8s linear infinite;
    }

    .photo-ring::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(transparent 60%, var(--accent2) 80%, transparent);
      opacity: 0.4;
      animation: spin 12s linear infinite reverse;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .photo-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: var(--surface);
      border: 3px solid var(--bg);
    }

    .photo-inner img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      z-index: 1;
    }

    .photo-placeholder {
      position: absolute;  
      inset: 0;            
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #e8e4de, #d8d3cc);
    }

    /* Name & tagline */
    .identity {
      text-align: center;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    .name {
      font-family: 'DM Mono', monospace;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1.3;
      color: var(--text);
    }

    .tagline {
      margin-top: 0.45rem;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.8;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
      max-width: 300px;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: rgba(255,255,255,0.6);
      text-decoration: none;
      color: var(--text);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.25s, background 0.25s, transform 0.2s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .link-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .link-item:hover::before { transform: translateX(100%); }

    .link-item:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.92);
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(58,107,138,0.1);
    }

    .link-linkedin:hover  { border-color: #0a66c2; box-shadow: 0 4px 16px rgba(10,102,194,0.12); }
    .link-github:hover    { border-color: #333;    box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .link-flickr:hover    { border-color: #ff0084; box-shadow: 0 4px 16px rgba(255,0,132,0.1); }
    .link-instagram:hover { border-color: #e1306c; box-shadow: 0 4px 16px rgba(225,48,108,0.1); }
    .link-contact:hover   { border-color: var(--accent2); box-shadow: 0 4px 16px rgba(122,171,114,0.15); }

    .link-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-icon svg { width: 16px; height: 16px; fill: currentColor; }

    .link-label { flex: 1; }

    .link-arrow {
      font-size: 0.8rem;
      opacity: 0.3;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link-item:hover .link-arrow { opacity: 1; transform: translateX(3px); }

    .links-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 0.1rem 0;
    }

    .footer {
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: fadeUp 0.9s 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
